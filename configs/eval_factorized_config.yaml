# TranScribe Factorized Evaluation Configuration

mode: "eval"
provider: "gemini"
output: "results/eval_results"
num_tries: 1

models:
  - "gemma-3-27b-it"

datasets:
  - name: "Sarcoma_cNMF_k10"
    path: "data/factorized/moh_sarcoma_cnmf.gene_spectra_score.k_10.dt_0_1.txt"
    modality: "factorized"
    factorized_type: "sc"
    organism: "Human"
    tissue: "Sarcoma"
    disease: "Cancer"
    ground_truth_path: "data/factorized/random_ground_truth.csv"
    # To overlay factors on raw spatial/sc data, provide the h5ad path here:
    # raw_data_path: "data/factorized/raw_data.h5ad"
