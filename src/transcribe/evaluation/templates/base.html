<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranScribe Evaluation Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!--CSS_LINK-->
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-title">TranScribe</div>
        <div class="sidebar-section">Overview</div>
        <div class="tab-link active" id="link_summary" onclick="showTab('tab_summary', this)">Overall Summary</div>
        <div class="sidebar-section" style="margin-top:8px">Experiments</div>
        <!--SIDEBAR_LINKS-->
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!--TAB_CONTENTS-->
    </div>

    <!-- Modal (shared) -->
    <div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
        <div class="modal-box">
            <div class="modal-head">
                <h3 id="modal_title" style="margin:0">Detail</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modal_body" class="modal-body"></div>
        </div>
    </div>

    <script>
        // ── Data embedded by report_generator.py ──────────────────────────────
        const EXPERIMENTS = <!--JS_EXPERIMENTS-->;
        const TRACES = <!--JS_TRACES-->;
        const EVAL_DATA = <!--JS_EVAL_DATA-->;
        const ANN_DATA = <!--JS_ANN_DATA-->;
        // ──────────────────────────────────────────────────────────────────────

        // ── Tab system ────────────────────────────────────────────────────────
        const _allPanes = () => document.querySelectorAll('.tab-pane');
        const _allLinks = () => document.querySelectorAll('.tab-link');

        function showTab(tabId, linkEl) {
            _allPanes().forEach(p => p.style.display = 'none');
            _allLinks().forEach(l => l.classList.remove('active'));
            const pane = document.getElementById(tabId);
            if (pane) pane.style.display = 'block';
            if (linkEl) linkEl.classList.add('active');
        }

        // ── View toggle (table / cards) ───────────────────────────────────────
        function switchView(type, runId) {
            const tbl = document.getElementById('tbl_' + runId);
            const cards = document.getElementById('cards_' + runId);
            const btns = document.querySelectorAll('.vtbtn_' + runId);
            btns.forEach(b => b.classList.remove('active'));
            if (type === 'table') {
                if (tbl) tbl.style.display = 'block';
                if (cards) cards.style.display = 'none';
                btns[0] && btns[0].classList.add('active');
            } else {
                if (tbl) tbl.style.display = 'none';
                if (cards) cards.style.display = 'grid';
                btns[1] && btns[1].classList.add('active');
            }
        }

        function toggleElement(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('hidden');
        }

        // ── Modal helpers ─────────────────────────────────────────────────────
        function closeModal() { document.getElementById('modal').classList.remove('open'); }

        function _showModal(title, bodyHtml) {
            document.getElementById('modal_title').textContent = title;
            document.getElementById('modal_body').innerHTML = bodyHtml;
            document.getElementById('modal').classList.add('open');
        }

        function openTrace(key, title) {
            const traces = TRACES[key] || [];
            if (!traces.length) { _showModal(title, '<div style="color:#8b949e">No trace data available.</div>'); return; }
            const msgs = traces.map(msg => {
                const agentCls = (msg.agent || 'system').toLowerCase().split(' ')[0];
                let content = '';
                if (msg.input) content += 'Input:\n' + JSON.stringify(msg.input, null, 2) + '\n\n';
                if (msg.output) content += 'Output:\n' + JSON.stringify(msg.output, null, 2) + '\n\n';
                if (msg.content) content += typeof msg.content === 'object' ? JSON.stringify(msg.content, null, 2) : msg.content;
                return `<div class="trace-msg ${agentCls}"><div class="trace-agent">${msg.agent || 'System'} ${msg.type || ''}</div><pre>${content.trim()}</pre></div>`;
            }).join('');
            _showModal(title, msgs);
        }

        function openBioMatch(key) {
            const res = EVAL_DATA[key];
            if (!res) { _showModal('Bio-Match', '<div style="color:#8b949e">No evaluation data.</div>'); return; }
            const col = res.is_match ? '#3fb950' : '#f85149';
            const lbl = res.is_match ? '✅ BIOLOGICAL MATCH' : '❌ NOT A MATCH';
            _showModal('Biological Evaluation',
                `<div style="background:rgba(188,140,255,0.08);padding:18px;border-radius:10px;border:1px solid #bc8cff">
                <div style="font-size:1rem;margin-bottom:12px;color:${col};font-weight:700">${lbl}</div>
                <div style="line-height:1.6;font-size:0.88rem">${res.explanation || 'No explanation provided.'}</div>
             </div>`);
        }

        function openAnnotation(key) {
            const reason = ANN_DATA[key];
            _showModal('Annotation Reasoning',
                reason
                    ? `<div style="background:rgba(56,139,253,0.08);padding:18px;border-radius:10px;border:1px solid #58a6ff;line-height:1.6;font-family:monospace;white-space:pre-wrap;font-size:0.82rem">${reason}</div>`
                    : '<div style="color:#8b949e">No annotation reasoning available.</div>');
        }

        // ── Summary page barplot ──────────────────────────────────────────────
        const COLORS = ['#58a6ff', '#3fb950', '#bc8cff', '#d29922', '#eb5353', '#e34c26', '#1f6feb', '#2d9da1'];
        const UNIQ_MODELS = [...new Set(EXPERIMENTS.map(e => e.model))];
        const UNIQ_DATASETS = [...new Set(EXPERIMENTS.map(e => e.name))];

        let _mode = 'model';
        let _filter = UNIQ_MODELS[0] || '';

        function setPlotMode(mode, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            _mode = mode;
            _filter = mode === 'all' ? 'all' : (mode === 'model' ? UNIQ_MODELS[0] : UNIQ_DATASETS[0]);
            _buildSecondaryFilters();
            _renderSummary();
        }

        function _buildSecondaryFilters() {
            const div = document.getElementById('sec_filters');
            if (!div) return;
            div.innerHTML = '';
            if (_mode === 'all') return;
            const items = _mode === 'model' ? UNIQ_MODELS : UNIQ_DATASETS;
            items.forEach((item, i) => {
                const b = document.createElement('button');
                b.className = 'btn-toggle sec-filter' + (i === 0 ? ' active' : '');
                b.textContent = item;
                b.onclick = () => {
                    document.querySelectorAll('.sec-filter').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    _filter = item;
                    _renderSummary();
                };
                div.appendChild(b);
            });
        }

        function _renderSummary() {
            let filtered = EXPERIMENTS.filter(e => e.is_eval);
            if (_mode === 'model') filtered = filtered.filter(e => e.model === _filter);
            if (_mode === 'dataset') filtered = filtered.filter(e => e.name === _filter);

            const cnt = filtered.length;
            const avgAcc = cnt ? filtered.reduce((s, e) => s + e.accuracy, 0) / cnt : 0;
            const avgBio = cnt ? filtered.reduce((s, e) => s + e.eval_accuracy, 0) / cnt : 0;

            _setBadge('badge_acc', avgAcc, cnt);
            _setBadge('badge_bio', avgBio, cnt);

            const lbl = document.getElementById('barplot_lbl');
            if (lbl) lbl.textContent = _mode === 'all' ? 'All Models & Datasets' : _filter;

            _drawBars(filtered);
        }

        function _setBadge(id, val, cnt) {
            const el = document.getElementById(id);
            if (!el) return;
            const cls = val >= 0.8 ? 'badge-high' : val >= 0.5 ? 'badge-med' : 'badge-low';
            el.className = 'badge ' + cls;
            el.textContent = cnt ? (val * 100).toFixed(1) + '%' : 'N/A';
        }

        function _drawBars(filtered) {
            const area = document.getElementById('bar_area');
            const legend = document.getElementById('bar_legend');
            if (!area) return;

            if (!filtered.length) {
                area.innerHTML = "<div style='color:#8b949e;width:100%;text-align:center'>No evaluation data.</div>";
                if (legend) legend.style.display = 'none';
                return;
            }

            if (_mode !== 'all') {
                if (legend) legend.style.display = 'none';
                area.innerHTML = filtered.map((e, i) => {
                    const pct = (e.eval_accuracy * 100).toFixed(1);
                    const h = Math.max(8, e.eval_accuracy * 195);
                    const bc = COLORS[i % COLORS.length];
                    const lbl = _mode === 'model' ? e.name : e.model;
                    return `<div class="bar-col">
                    <div class="bar-val" style="color:${bc}">${pct}%</div>
                    <div class="bar-rect" style="height:${h}px;background:${bc}" onclick="document.getElementById('link_${e.run_id}').click()" title="${lbl}"></div>
                    <div class="bar-lbl">${lbl}</div></div>`;
                }).join('');
            } else {
                if (legend) {
                    legend.style.display = 'flex';
                    legend.innerHTML = UNIQ_MODELS.map((m, i) =>
                        `<div style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);padding:3px 9px;border-radius:5px">
                        <div style="width:10px;height:10px;background:${COLORS[i % COLORS.length]};border-radius:3px"></div>
                        <span style="font-size:0.76rem">${m}</span></div>`
                    ).join('');
                }
                area.innerHTML = UNIQ_DATASETS.map(dName => {
                    const bars = UNIQ_MODELS.map((mName, mIdx) => {
                        const exp = filtered.find(e => e.name === dName && e.model === mName);
                        if (!exp) return '';
                        const pct = (exp.eval_accuracy * 100).toFixed(0);
                        const h = Math.max(6, exp.eval_accuracy * 195);
                        const bc = COLORS[mIdx % COLORS.length];
                        return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:26px;margin:0 2px" title="${mName}: ${pct}%">
                        <div style="font-size:0.63rem;color:${bc};margin-bottom:2px">${pct}</div>
                        <div style="width:100%;height:${h}px;background:${bc};border-radius:4px 4px 0 0;cursor:pointer" onclick="document.getElementById('link_${exp.run_id}').click()"></div></div>`;
                    }).join('');
                    return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:55px">
                    <div style="display:flex;align-items:flex-end;height:100%">${bars}</div>
                    <div style="font-size:0.73rem;text-align:center;color:#8b949e;border-top:1px solid rgba(255,255,255,0.13);padding-top:4px;width:100%">${dName}</div></div>`;
                }).join('');
            }
        }

        // ── Boot ──────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            // Hide all panes, show only summary initially
            _allPanes().forEach(p => p.style.display = 'none');
            const summary = document.getElementById('tab_summary');
            if (summary) summary.style.display = 'block';

            _buildSecondaryFilters();
            _renderSummary();
        });
    </script>
</body>

</html>
