<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranScribe Evaluation Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!--CSS_LINK-->
</head>

<body>
    <div class="header">
        <h1>TranScribe <span style="font-weight:300">| Multi-Agent Biology</span></h1>
        <div style="font-size:0.9rem;color:#8b949e">Benchmark & Annotation Dashboard</div>
    </div>

    <div class="container">
        <!-- Sidebar Links -->
        <div class="sidebar">
            <div class="tab-link active" id="link_summary" onclick="showTab('tab_summary', this)">Overall Summary</div>
            <h3 style="padding:0 12px; font-size: 0.8rem; text-transform: uppercase; color: #8b949e">Experiments</h3>
            __SIDEBAR_LINKS__
        </div>

        <!-- Main Content (Tabs) -->
        <div class="main-content">
            __SUMMARY_PANE__
            __EXPERIMENT_TABS__
        </div>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-head">
                <h3 id="modalTitle">Analysis Trace</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        // Tab Data Layer
        const EXPERIMENTS = __JS_EXPERIMENTS__;
        const TRACES = __JS_TRACES__;
        const EVAL_DATA = __JS_EVAL_DATA__;
        const ANN_DATA = __JS_ANN_DATA__;
        const PATHWAY_DATA = __JS_PATHWAY_DATA__;
        const ZETA_DATA = __JS_ZETA_DATA__;
        // ──────────────────────────────────────────────────────────────────────

        // ── Tab system ────────────────────────────────────────────────────────
        const _allPanes = () => document.querySelectorAll('.tab-pane');
        const _allLinks = () => document.querySelectorAll('.tab-link');

        function showTab(tabId, linkEl) {
            _allPanes().forEach(p => p.style.display = 'none');
            _allLinks().forEach(l => l.classList.remove('active'));
            const pane = document.getElementById(tabId);
            if (pane) pane.style.display = 'block';
            if (linkEl) linkEl.classList.add('active');
        }

        // ── View toggle (table / cards) ───────────────────────────────────────
        function switchView(type, runId) {
            const tbl = document.getElementById('tbl_' + runId);
            const cards = document.getElementById('cards_' + runId);
            const btns = document.querySelectorAll('.vtbtn_' + runId);
            btns.forEach(b => b.classList.remove('active'));
            if (type === 'table') {
                if (tbl) tbl.style.display = 'block';
                if (cards) cards.style.display = 'none';
                btns[0] && btns[0].classList.add('active');
            } else {
                if (tbl) tbl.style.display = 'none';
                if (cards) cards.style.display = 'grid';
                btns[1] && btns[1].classList.add('active');
            }
        }

        function toggleElement(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('hidden');
        }

        // ── Modal helpers ─────────────────────────────────────────────────────
        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

        function _showModal(title, bodyHtml) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = bodyHtml;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function openTrace(key, customTitle) {
            const trace = TRACES[key] || [];
            if (!trace.length) { _showModal('Trace', '<div style="color:#8b949e">No trace data available.</div>'); return; }
            let html = '';
            trace.forEach(msg => {
                const role = (msg.role || 'System').toLowerCase();
                const cls = role.includes('alpha') ? 'alpha' : 
                          (role.includes('epsilon') ? 'beta' : 
                          (role.includes('beta') ? 'beta' : 
                          (role.includes('gamma') ? 'gamma' : 
                          (role.includes('zeta') ? 'gamma' : 'system'))));
                let content = msg.content || '';
                if (typeof content === 'object') content = JSON.stringify(content, null, 2);
                html += `<div class="trace-msg ${cls}"><div class="trace-agent">${msg.role}</div><pre>${content}</pre></div>`;
            });
            _showModal(customTitle || ('Analysis Trace: ' + key), html);
        }

        function openBatchGamma() {
            const globalTrace = TRACES['__GLOBAL_GAMMA__'] || [];
            if (!globalTrace.length) { _showModal('Batch Gamma', 'No global trace found.'); return; }
            let html = '';
            globalTrace.forEach(msg => {
                html += `<div class="trace-msg gamma"><div class="trace-agent">Global ${msg.role}</div><pre>${msg.content}</pre></div>`;
            });
            _showModal('Global Batch Gamma Trace', html);
        }

        function openBioMatch(key) {
            const res = EVAL_DATA[key];
            if (!res) { _showModal('Bio-Match', 'No eval data.'); return; }
            const col = res.is_match ? '#3fb950' : '#f85149';
            const lbl = res.is_match ? '✅ BIOLOGICAL MATCH' : '❌ NOT A MATCH';
            _showModal('Biological Evaluation',
                `<div style="background:rgba(188,140,255,0.08);padding:18px;border-radius:10px;border:1px solid #bc8cff">
                    <div style="font-size:1.1rem;margin-bottom:12px;color:${col};font-weight:700">${lbl}</div>
                    <div style="line-height:1.6;font-size:0.9rem">${res.explanation || 'No explanation.'}</div>
                 </div>`);
        }

        function openAnnotation(key) {
            const reason = ANN_DATA[key];
            _showModal('Annotation Reasoning', 
                `<div class="trace-msg gamma" style="border:1px solid var(--purple)">
                    <div class="trace-agent">Gamma Ontologist Logic</div>
                    <pre style="white-space:pre-wrap">${reason || 'N/A'}</pre>
                 </div>`);
        }

        function openPathway(key) {
            const data = PATHWAY_DATA[key];
            if (!data) { _showModal('Pathway Activity', 'No activity data.'); return; }
            const summary = data.summary || data.biological_summary || 'Enrichment summary available.';
            const reasoning = data.reasoning || data.biological_summary || '';
            const states = data.suggested_cell_states || data.rationales || [];
            let html = `<div style="padding:15px; background:rgba(210,153,34,0.1); border-radius:10px; border:1px solid #d29922; color:#d29922; margin-bottom:15px">
                            <strong>Summary:</strong> ${summary}
                        </div>`;
            if (reasoning) html += `<h4>Reasoning:</h4><div class="trace-msg system"><pre style="white-space:pre-wrap">${reasoning}</pre></div>`;
            if (states && states.length) html += '<h4>Suggested States:</h4><ul>' + states.map(r => `<li>${r}</li>`).join('') + '</ul>';
            if (data.top_pathways) html += '<h4>Top Pathways:</h4><div class="genes-list">' + data.top_pathways.map(p => `<span class="gene-chip">${p}</span>`).join('') + '</div>';
            _showModal('Pathway Activity | Agent Epsilon', html);
        }

        function openZeta(key) {
            const data = ZETA_DATA[key];
            if (!data) { _showModal('Zeta Validation', 'No validation data.'); return; }
            const score = data.overlap_score || 0;
            const col = score >= 0.7 ? '#3fb950' : (score >= 0.4 ? '#d29922' : '#f85149');
            let html = `
                <div style="border-left:4px solid ${col}; padding-left:15px; margin-bottom:20px">
                    <h2 style="color:${col}; margin:0">Quantitative Overlap: ${Math.round(score * 100)}%</h2>
                    <p style="color:#8b949e; margin-top:5px; font-size:0.9rem">Calculated programmatically based on DEG vs Canonical Markers</p>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px">
                    <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:10px">
                        <strong style="color:var(--blue)">Expected Markers</strong>
                        <div class="genes-list">${(data.expected_markers || []).map(g => `<span class="gene-chip">${g}</span>`).join('')}</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:10px">
                        <strong style="color:var(--green)">Observed Matches</strong>
                        <div class="genes-list">${(data.observed_markers || []).map(g => `<span class="gene-chip">${g}</span>`).join('')}</div>
                    </div>
                </div>
                <div class="trace-msg gamma" style="border:1px solid var(--purple)">
                    <div class="trace-agent">Zeta Validation Narrative</div>
                    <pre style="white-space:pre-wrap">${data.agreement_narrative || 'N/A'}</pre>
                </div>
                <div style="margin-top:15px; text-align:right">
                    <button class="btn btn-purple" onclick="openTrace('${key}')">View Full Cluster Trace</button>
                </div>`;
            _showModal('Confidence Assessment | Agent Zeta', html);
        }

        // ── Summary page barplot ──────────────────────────────────────────────
        const COLORS = ['#58a6ff', '#3fb950', '#bc8cff', '#d29922', '#eb5353', '#e34c26', '#1f6feb', '#2d9da1'];
        const UNIQ_MODELS = [...new Set(EXPERIMENTS.map(e => e.model))];
        const UNIQ_DATASETS = [...new Set(EXPERIMENTS.map(e => e.name))];

        let _mode = 'all';
        let _filter = 'all';

        function setPlotMode(mode, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            _mode = mode;
            _filter = mode === 'all' ? 'all' : (mode === 'model' ? UNIQ_MODELS[0] : UNIQ_DATASETS[0]);
            _buildSecondaryFilters();
            _renderSummary();
        }

        function _buildSecondaryFilters() {
            const div = document.getElementById('sec_filters');
            if (!div) return;
            div.innerHTML = '';
            if (_mode === 'all') return;
            const items = _mode === 'model' ? UNIQ_MODELS : UNIQ_DATASETS;
            items.forEach((item, i) => {
                const b = document.createElement('button');
                b.className = 'btn-toggle sec-filter' + (i === 0 ? ' active' : '');
                b.textContent = item;
                b.onclick = () => {
                    document.querySelectorAll('.sec-filter').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    _filter = item;
                    _renderSummary();
                };
                div.appendChild(b);
            });
        }

        function _renderSummary() {
            let filtered = EXPERIMENTS.filter(e => e.is_eval);
            if (_mode === 'model') filtered = filtered.filter(e => e.model === _filter);
            if (_mode === 'dataset') filtered = filtered.filter(e => e.name === _filter);

            const cnt = filtered.length;
            const avgBio = cnt ? filtered.reduce((s, e) => s + e.llmaj_accuracy, 0) / cnt : 0;

            _setBadge('badge_bio', avgBio, cnt);
            const lbl = document.getElementById('barplot_lbl');
            if (lbl) lbl.textContent = _mode === 'all' ? 'All Models & Datasets' : _filter;
            _drawBars(filtered);
        }

        function _setBadge(id, val, cnt) {
            const el = document.getElementById(id);
            if (!el) return;
            const cls = val >= 0.8 ? 'badge-high' : val >= 0.5 ? 'badge-med' : 'badge-low';
            el.className = 'badge ' + cls;
            el.textContent = cnt ? (val * 100).toFixed(1) + '%' : 'N/A';
        }

        function _drawBars(filtered) {
            const area = document.getElementById('bar_area');
            const legend = document.getElementById('bar_legend');
            if (!area) return;

            if (!filtered.length) {
                area.innerHTML = "<div style='color:#8b949e;width:100%;text-align:center'>No evaluation data.</div>";
                if (legend) legend.style.display = 'none';
                return;
            }

            if (_mode !== 'all') {
                if (legend) legend.style.display = 'none';
                area.innerHTML = filtered.map((e, i) => {
                    const pct = (e.llmaj_accuracy * 100).toFixed(1);
                    const h = Math.max(8, e.llmaj_accuracy * 195);
                    const bc = COLORS[i % COLORS.length];
                    const lbl = _mode === 'model' ? e.name : e.model;
                    return `<div class="bar-col"><div class="bar-val" style="color:${bc}">${pct}%</div><div class="bar-rect" style="height:${h}px;background:${bc}" onclick="document.getElementById('link_${e.run_id}').click()" title="${lbl}"></div><div class="bar-lbl">${lbl}</div></div>`;
                }).join('');
            } else {
                if (legend) {
                    legend.style.display = 'flex';
                    legend.innerHTML = UNIQ_MODELS.map((m, i) =>
                        `<div style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);padding:3px 9px;border-radius:5px"><div style="width:10px;height:10px;background:${COLORS[i % COLORS.length]};border-radius:3px"></div><span style="font-size:0.76rem">${m}</span></div>`
                    ).join('');
                }
                area.innerHTML = UNIQ_DATASETS.map(dName => {
                    const bars = UNIQ_MODELS.map((mName, mIdx) => {
                        const exp = filtered.find(e => e.name === dName && e.model === mName);
                        if (!exp) return '';
                        const pct = (exp.llmaj_accuracy * 100).toFixed(0);
                        const h = Math.max(6, exp.llmaj_accuracy * 195);
                        const bc = COLORS[mIdx % COLORS.length];
                        return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:26px;margin:0 2px" title="${mName}: ${pct}%"><div style="font-size:0.63rem;color:${bc};margin-bottom:2px">${pct}</div><div style="width:100%;height:${h}px;background:${bc};border-radius:4px 4px 0 0;cursor:pointer" onclick="document.getElementById('link_${exp.run_id}').click()"></div></div>`;
                    }).join('');
                    return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:55px"><div style="display:flex;align-items:flex-end;height:100%">${bars}</div><div style="font-size:0.73rem;text-align:center;color:#8b949e;border-top:1px solid rgba(255,255,255,0.13);padding-top:4px;width:100%">${dName}</div></div>`;
                }).join('');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
             // Show summary tab by default
            _allPanes().forEach(p => p.style.display = 'none');
            const summary = document.getElementById('tab_summary');
            if (summary) summary.style.display = 'block';

            _buildSecondaryFilters();
            _renderSummary();
        });
    </script>
</body>

</html>
